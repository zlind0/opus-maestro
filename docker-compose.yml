version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-music}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-musicpass}
      POSTGRES_DB: ${POSTGRES_DB:-music}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-music}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-music}:${POSTGRES_PASSWORD:-musicpass}@db:5432/${POSTGRES_DB:-music}
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-string-at-least-32-chars}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      MUSIC_PATH: /music
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-zh-CN}
    volumes:
      - ${MUSIC_PATH:-./music}:/music:ro
    networks:
      - internal_net

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: ["npm","run","dev","--","--host","0.0.0.0","--port","80"]
    networks:
      - internal_net

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    environment:
      - NGINX_HOST=proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - internal_net

volumes:
  pgdata:
  # (no-op) placeholder for future shared volumes
  frontend_node_modules:

networks:
  internal_net:
    driver: bridge
